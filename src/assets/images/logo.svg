<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#409eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67c23a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo 文字 -->
  <text x="10" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#logoGradient)">PSCG</text>
  
  <!-- 装饰线条 -->
  <rect x="10" y="48" width="80" height="3" rx="1.5" fill="url(#logoGradient)" opacity="0.6"/>
